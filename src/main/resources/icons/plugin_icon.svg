<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1a1f36"/>

  <!-- Subtle grid lines -->
  <line x1="20" y1="32" x2="108" y2="32" stroke="#2a3158" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="64" x2="108" y2="64" stroke="#2a3158" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="96" x2="108" y2="96" stroke="#2a3158" stroke-width="1" opacity="0.5"/>

  <!-- Candlestick 1 (red, bearish) -->
  <rect x="26" y="52" width="12" height="28" fill="#fc6060" rx="2"/>
  <line x1="32" y1="44" x2="32" y2="52" stroke="#fc6060" stroke-width="2"/>
  <line x1="32" y1="80" x2="32" y2="90" stroke="#fc6060" stroke-width="2"/>

  <!-- Candlestick 2 (green, bullish) -->
  <rect x="44" y="38" width="12" height="36" fill="#4ade80" rx="2"/>
  <line x1="50" y1="28" x2="50" y2="38" stroke="#4ade80" stroke-width="2"/>
  <line x1="50" y1="74" x2="50" y2="82" stroke="#4ade80" stroke-width="2"/>

  <!-- Candlestick 3 (green, bullish) -->
  <rect x="62" y="30" width="12" height="32" fill="#4ade80" rx="2"/>
  <line x1="68" y1="22" x2="68" y2="30" stroke="#4ade80" stroke-width="2"/>
  <line x1="68" y1="62" x2="68" y2="70" stroke="#4ade80" stroke-width="2"/>

  <!-- Candlestick 4 (green, bullish - highest) -->
  <rect x="80" y="24" width="12" height="40" fill="#4ade80" rx="2"/>
  <line x1="86" y1="16" x2="86" y2="24" stroke="#4ade80" stroke-width="2"/>
  <line x1="86" y1="64" x2="86" y2="74" stroke="#4ade80" stroke-width="2"/>

  <!-- MA line (orange/gold) -->
  <polyline
    points="32,60 50,52 68,40 86,34"
    fill="none"
    stroke="#fbbf24"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- MA dots -->
  <circle cx="32" cy="60" r="4" fill="#fbbf24"/>
  <circle cx="50" cy="52" r="4" fill="#fbbf24"/>
  <circle cx="68" cy="40" r="4" fill="#fbbf24"/>
  <circle cx="86" cy="34" r="4" fill="#fbbf24"/>

  <!-- Trend arrow (up) -->
  <path d="M100 100 L108 100 L104 92 Z" fill="#4ade80"/>
  <line x1="104" y1="100" x2="104" y2="86" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
</svg>
