<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Background: slightly lighter for dark theme -->
  <rect width="40" height="40" rx="8" fill="#22284a"/>

  <!-- Subtle grid lines -->
  <line x1="6" y1="10" x2="34" y2="10" stroke="#323966" stroke-width="0.5"/>
  <line x1="6" y1="20" x2="34" y2="20" stroke="#323966" stroke-width="0.5"/>
  <line x1="6" y1="30" x2="34" y2="30" stroke="#323966" stroke-width="0.5"/>

  <!-- Candlestick 1: bearish (red) -->
  <line x1="9" y1="14" x2="9" y2="16" stroke="#ff7878" stroke-width="1.2"/>
  <rect x="6.5" y="16" width="5" height="8" fill="#ff7878" rx="0.8"/>
  <line x1="9" y1="24" x2="9" y2="27" stroke="#ff7878" stroke-width="1.2"/>

  <!-- Candlestick 2: bullish (green) -->
  <line x1="18" y1="11" x2="18" y2="13" stroke="#6ee79a" stroke-width="1.2"/>
  <rect x="15.5" y="13" width="5" height="10" fill="#6ee79a" rx="0.8"/>
  <line x1="18" y1="23" x2="18" y2="26" stroke="#6ee79a" stroke-width="1.2"/>

  <!-- Candlestick 3: bullish (green, higher) -->
  <line x1="27" y1="8" x2="27" y2="10" stroke="#6ee79a" stroke-width="1.2"/>
  <rect x="24.5" y="10" width="5" height="11" fill="#6ee79a" rx="0.8"/>
  <line x1="27" y1="21" x2="27" y2="24" stroke="#6ee79a" stroke-width="1.2"/>

  <!-- MA line -->
  <polyline
    points="9,19 18,17 27,14"
    fill="none"
    stroke="#fcd34d"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- MA dots -->
  <circle cx="9"  cy="19" r="1.5" fill="#fcd34d"/>
  <circle cx="18" cy="17" r="1.5" fill="#fcd34d"/>
  <circle cx="27" cy="14" r="1.5" fill="#fcd34d"/>

  <!-- Up arrow -->
  <polyline
    points="32,34 35,28 38,34"
    fill="none"
    stroke="#6ee79a"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <line x1="35" y1="28" x2="35" y2="36" stroke="#6ee79a" stroke-width="1.8" stroke-linecap="round"/>
</svg>
